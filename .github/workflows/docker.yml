name: Docker ARM64

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: affromero/fairtrail

jobs:
  build-arm64:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push arm64 by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          build-args: |
            COMMIT_SHA=${{ github.event.workflow_run.head_sha }}
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          digest="${{ steps.build.outputs.digest }}"
          echo "arm64_digest=$digest" >> "$GITHUB_OUTPUT"
          echo "ARM64 digest: $digest"
        id: digest

      - name: Get version
        id: version
        run: echo "version=$(node -p "require('./apps/web/package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Get existing amd64 digest
        id: amd64
        run: |
          # Get the amd64 digest from the existing :latest image (pushed by /deploy-fairtrail)
          amd64_digest=$(docker buildx imagetools inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest --raw 2>/dev/null \
            | jq -r '.manifests[] | select(.platform.architecture=="amd64") | .digest' 2>/dev/null || echo "")

          if [ -z "$amd64_digest" ]; then
            # No existing multi-arch manifest -- use :latest as a single-arch amd64 image
            amd64_digest=$(docker buildx imagetools inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest --raw 2>/dev/null \
              | jq -r '.digest // empty' 2>/dev/null || echo "")
          fi

          if [ -z "$amd64_digest" ]; then
            echo "No existing amd64 image found -- pushing arm64-only manifest"
            echo "found=false" >> "$GITHUB_OUTPUT"
          else
            echo "Found amd64 digest: $amd64_digest"
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "digest=$amd64_digest" >> "$GITHUB_OUTPUT"
          fi

      - name: Create multi-arch manifest
        run: |
          if [ "${{ steps.amd64.outputs.found }}" = "true" ]; then
            echo "Merging amd64 + arm64 into multi-arch manifest"
            docker buildx imagetools create \
              -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
              -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }} \
              ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.amd64.outputs.digest }} \
              ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.digest.outputs.arm64_digest }}
          else
            echo "No amd64 image -- tagging arm64-only"
            docker buildx imagetools create \
              -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
              -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }} \
              ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.digest.outputs.arm64_digest }}
          fi

      - name: Verify manifest
        run: |
          docker buildx imagetools inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
